<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>토론</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="message" class="message" style="display:none"></div>

  <div id="app" style="display:none">
    <header>
      <div class="header-left">
        <span id="nickname" class="nickname"></span>
        <span id="side-badge" class="side-badge"></span>
      </div>
      <button id="open-modal-btn" class="btn-primary" style="display:none">의견 제출</button>
    </header>

    <div class="topic-bar">
      <h1 id="debate-title" class="debate-title"></h1>
    </div>

    <main>
      <div id="opinions-list" class="opinions-list">
        <p class="empty-text">아직 제출된 의견이 없습니다.</p>
      </div>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2>의견 제출</h2>
        <button id="close-modal-btn" class="modal-close">&times;</button>
      </div>
      <textarea
        id="opinion-input"
        placeholder="이 주제에 대한 의견을 자유롭게 작성하세요..."
        rows="8"
      ></textarea>
      <div class="modal-footer">
        <button id="submit-btn" class="btn-primary">제출하기</button>
      </div>
    </div>
  </div>

  <script
    src="debate-core.js"
    data-architect-id="dan"
  ></script>
  <script src="app.js"></script>

</body>
</html>
